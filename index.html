<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Stock | Interfaz Limpia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        /* Scrollbars elegantes */
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-200 pb-4 gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">Evolución de Stock</h1>
                <p class="text-xs text-slate-500 mt-0.5">Visualización interactiva y limpia de la hoja de ruta semanal.</p>
            </div>
            
            <div id="searchContainer" class="hidden w-full sm:w-72">
                <input type="text" id="ganttSearch" placeholder="Filtrar por referencia o componente..." 
                       class="w-full px-3 py-1.5 text-sm bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500 transition-colors shadow-xs">
            </div>
        </header>

        <section id="uploadSection" class="bg-white p-4 rounded-xl border border-slate-200 shadow-xs">
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-lg p-10 bg-slate-50 hover:bg-slate-100/50 transition-colors cursor-pointer relative" id="dropZone">
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <svg class="mx-auto h-10 w-10 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <p class="mt-3 text-sm font-medium text-blue-600">Arrastra aquí tu archivo Excel o haz clic para seleccionar</p>
                <p class="text-xs text-slate-400 mt-1">Soporta formatos .xlsx, .xls y .csv</p>
            </div>
        </section>

        <section id="tableContainer" class="bg-white rounded-xl border border-slate-200 shadow-xs overflow-hidden hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse text-xs whitespace-nowrap">
                    <thead id="tableHead" class="bg-slate-50 sticky top-0 border-b border-slate-200 z-10 font-semibold text-slate-700">
                        </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-slate-600">
                        </tbody>
                </table>
            </div>
        </section>

    </div>

    <script>
        let rawRows = []; // Almacén para el filtrado en tiempo real

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');

        // Eventos para diseño visual del dragover
        ['dragenter', 'dragover'].forEach(name => {
            dropZone.addEventListener(name, () => dropZone.classList.add('bg-slate-100'), false);
        });
        ['dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, () => dropZone.classList.remove('bg-slate-100'), false);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // Convertimos la hoja en una matriz pura (filas y columnas) sin omitir celdas vacías
                rawRows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                
                if (rawRows.length > 0) {
                    // Ocultamos la zona de subida (o la dejamos pequeña) y mostramos los datos
                    document.getElementById('uploadSection').classList.add('hidden');
                    document.getElementById('searchContainer').classList.remove('hidden');
                    document.getElementById('tableContainer').classList.remove('hidden');
                    
                    renderMatrix(rawRows);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        function renderMatrix(rows) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            
            // La primera fila de tu Excel contiene los títulos de las columnas (Semanas, Referencias, etc.)
            const headerRow = rows[0];
            
            // Render Cabecera
            let headHTML = "<tr>";
            headerRow.forEach((cell, index) => {
                // Fijamos las dos primeras columnas a la izquierda (sticky) para no perder la referencia al hacer scroll
                if (index === 0) {
                    headHTML += `<th class="p-3 bg-slate-50 sticky left-0 z-20 border-r border-slate-200 min-w-[120px] font-bold">${cell}</th>`;
                } else if (index === 1) {
                    headHTML += `<th class="p-3 bg-slate-50 sticky left-[120px] z-20 border-r border-slate-200 min-w-[180px] font-medium text-slate-500">${cell}</th>`;
                } else {
                    // Formateamos las semanas para que se vean más limpias
                    const cleanCell = String(cell).replace('-2026', '');
                    headHTML += `<th class="p-3 text-center min-w-[65px] border-r border-slate-100">${cleanCell}</th>`;
                }
            });
            headHTML += "</tr>";
            thead.innerHTML = headHTML;

            // Render Filas de datos
            let bodyHTML = "";
            // Iteramos a partir de la fila 1 (saltándonos la cabecera)
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                // Ignorar filas completamente vacías o la fila de resumen si no aporta
                if (!row || row.length === 0 || row[0] === "") continue;

                bodyHTML += `<tr class="hover:bg-slate-50/80 transition-colors">`;
                
                headerRow.forEach((_, colIndex) => {
                    const cellValue = row[colIndex] !== undefined ? row[colIndex] : "";
                    
                    if (colIndex === 0) {
                        // Columna fija 1: Referencia
                        bodyHTML += `<td class="p-3 font-mono font-bold text-slate-900 sticky left-0 bg-white border-r border-slate-200 z-10 shadow-[2px_0_5px_rgba(0,0,0,0.01)]">${cellValue}</td>`;
                    } else if (colIndex === 1) {
                        // Columna fija 2: Nombre / Descripción
                        bodyHTML += `<td class="p-3 text-slate-500 sticky left-[120px] bg-white border-r border-slate-200 z-10 truncate max-w-[200px] shadow-[2px_0_5px_rgba(0,0,0,0.01)]" title="${cellValue}">${cellValue}</td>`;
                    } else {
                        // Columnas evolutivas (Valores de Stock)
                        let bgClass = "bg-white text-slate-600";
                        const num = Number(String(cellValue).replace(/[\s,%]/g, '').replace(',', '.'));

                        // Si es un número válido y es menor que 0, aplicamos el rojo de rotura
                        if (!isNaN(num) && String(cellValue).trim() !== "") {
                            if (num < 0) {
                                bgClass = "bg-rose-500 text-white font-semibold rounded-sm";
                            } else if (num > 0) {
                                bgClass = "bg-emerald-50 text-emerald-700 font-medium";
                            }
                        }

                        bodyHTML += `
                            <td class="p-1 text-center border-r border-b border-slate-100 min-w-[65px]">
                                <span class="block py-1 px-1 text-[11px] ${bgClass}">
                                    ${cellValue === 0 || cellValue === "0" ? '-' : cellValue.toLocaleString()}
                                </span>
                            </td>`;
                    }
                });
                
                bodyHTML += `</tr>`;
            }
            tbody.innerHTML = bodyHTML;
        }

        // Buscador reactivo por texto
        document.getElementById('ganttSearch').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            if (rawRows.length === 0) return;

            // Filtramos las filas manteniendo siempre la fila 0 (cabecera)
            const filteredRows = [rawRows[0]];
            
            for (let i = 1; i < rawRows.length; i++) {
                const row = rawRows[i];
                if (row[0] && (String(row[0]).toLowerCase().includes(query) || String(row[1]).toLowerCase().includes(query))) {
                    filteredRows.push(row);
                }
            }
            renderMatrix(filteredRows);
        });
    </script>
</body>
</html>
